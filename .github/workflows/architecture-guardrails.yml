name: Architecture Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SUPABASE_DB_POOLER_URL: ${{ secrets.SUPABASE_DB_POOLER_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Astro types
        run: pnpm exec astro sync

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Astro check
        run: pnpm run check

      - name: UI guardrail
        run: pnpm run check:ui

      - name: Guardrails suite
        run: pnpm test tests/guardrails

      - name: Governance capability suite (enforced)
        if: ${{ env.DATABASE_URL != '' || env.SUPABASE_DB_POOLER_URL != '' }}
        run: pnpm run test:governance

      - name: Full test suite
        if: ${{ env.DATABASE_URL != '' || env.SUPABASE_DB_POOLER_URL != '' }}
        run: pnpm test
